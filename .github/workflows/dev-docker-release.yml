name: Dev release (build, scan, push)

on:
  pull_request:
    branches: [dev]
    types: [closed]

jobs:
  release:
    # Only run when PR was merged into dev AND the PR came from integration
    if: ${{ github.event.pull_request.merged == true && github.event.pull_request.head.ref == 'integration' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name
        run: echo "IMAGE_NAME=afif1710/algosort-frontend" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build locally first (do NOT push yet)
      - name: Build Docker image (local)
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          load: true
          tags: |
            ${{ env.IMAGE_NAME }}:dev-${{ github.sha }}

      # Vulnerability test on the built image
      - name: Vulnerability scan (Trivy)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:dev-${{ github.sha }}
          format: table
          vuln-type: os,library
          severity: HIGH,CRITICAL
          exit-code: "1"

      # Push only if scan passed
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Docker image (tags)
        run: |
          docker tag ${{ env.IMAGE_NAME }}:dev-${{ github.sha }} ${{ env.IMAGE_NAME }}:dev-latest
          docker push ${{ env.IMAGE_NAME }}:dev-${{ github.sha }}
          docker push ${{ env.IMAGE_NAME }}:dev-latest
