name: Feat CI (lint changed + sonar + PR to integration)

on:
  push:
    branches:
      - "feat/*"

permissions:
  contents: write
  pull-requests: write

jobs:
  lint_sonar_pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Detect changed frontend src files
        id: changes
        uses: dorny/paths-filter@v3
        with:
          list-files: shell
          filters: |
            frontend_src:
              - 'frontend/src/**/*.{js,jsx,ts,tsx}'

      - name: Lint changed files only
        if: steps.changes.outputs.frontend_src == 'true'
        working-directory: frontend
        run: npx eslint ${{ steps.changes.outputs.frontend_src_files }}

      - name: SonarQube Cloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Create PR to integration
        uses: peter-evans/create-pull-request@v6
        with:
          base: integration
          title: "integration: merge ${{ github.ref_name }}"
          body: "Auto PR from ${{ github.ref_name }} to integration."
          branch: "auto/integration-${{ github.ref_name }}"
          delete-branch: true
